<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <script src="//ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>
    <script>
     var grange='';
     function selectRange()
     {
       $('#btn1').prop('disabled',true);
       $('#btn2').prop('disabled',false);
       google.script.run
         .withSuccessHandler(setResponse)
         .selectCurrentRange();
     }
     function setResponse(r)
     {
       grange=r;
       var msg='You have selected the range '  + r; 
       $('#instr').css('display','none');
       $('#rsp').text(msg); 
     }
     function clearAndClose()
     {
       google.script.run.clearRange(grange);
       google.script.host.close();

     }
     console.log('My Code');
    </script>
  </head>
  <body>
    <div id="rsp"></div>
    <div id="instr">Please select your desired range, then click "Confirm".<br />If the range highlighted is correct, click "Close"</div>
    <input type="button" id="btn1" value="Confirm" onClick="selectRange();" />
    <br /><input type="button" id="btn2" value="Close" onClick="clearAndClose();"; disabled="true" />
  </body>
</html>
